{% extends "base.html" %}
{% block title %}创建题目 - 排序评测系统{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3>📝 创建新题目</h3>
  <a href="{{ url_for('teacher.manage_problems') }}" class="btn btn-outline-secondary">← 返回管理</a>
</div>

<div class="card">
  <div class="card-body">
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <h5>基本信息</h5>
      <div class="mb-3">
        <label class="form-label">题目标题 <span class="text-danger">*</span></label>
        <input type="text" class="form-control" name="title" placeholder="如：实现冒泡排序" required>
      </div>
      <div class="mb-3">
        <label class="form-label">题目描述</label>
        <textarea class="form-control" name="description" rows="6"
          placeholder="描述排序要求、输入输出格式、示例等"></textarea>
      </div>

      <h5>评测配置</h5>
      <div class="row">
        <div class="col-md-3 mb-3">
          <label class="form-label">难度</label>
          <select class="form-select" name="difficulty">
            <option value="easy">简单</option>
            <option value="medium" selected>中等</option>
            <option value="hard">困难</option>
          </select>
        </div>
        <div class="col-md-3 mb-3">
          <label class="form-label">目标算法</label>
          <select class="form-select" name="algo_type">
            <option value="bubble">冒泡排序</option>
            <option value="select">选择排序</option>
            <option value="insert">插入排序</option>
            <option value="quick">快速排序</option>
            <option value="merge">归并排序</option>
            <option value="heap">堆排序</option>
            <option value="any" selected>不限</option>
          </select>
        </div>
        <div class="col-md-3 mb-3">
          <label class="form-label">排序规则</label>
          <select class="form-select" name="sort_rule">
            <option value="strict" selected>严格排序 (strict)</option>
            <option value="stalin">斯大林排序 (stalin)</option>
            <option value="stable">稳定排序 (stable)</option>
            <option value="topk">Top-K</option>
          </select>
        </div>
        <div class="col-md-3 mb-3">
          <label class="form-label">复杂度上限</label>
          <select class="form-select" name="complexity_ceiling">
            <option value="" selected>不限</option>
            <option value="O(n log n)">O(n log n)</option>
            <option value="O(n)">O(n)</option>
          </select>
        </div>
      </div>

      <hr>
      <div class="d-flex justify-content-between align-items-center mb-2">
        <h5>测试用例</h5>
        <button type="button" class="btn btn-outline-success btn-sm" onclick="addTestCase()">+ 添加用例</button>
      </div>
      <div id="testcases-container">
        <!-- 默认 2 组 -->
        <div class="testcase-group card mb-2 p-3 bg-light">
          <div class="row">
            <div class="col-md-5 mb-2">
              <label class="form-label small">输入 (JSON 数组)</label>
              <input type="text" class="form-control" name="tc_input" value="[5,2,8,1,3]">
            </div>
            <div class="col-md-5 mb-2">
              <label class="form-label small">期望输出 (可选)</label>
              <input type="text" class="form-control" name="tc_expected" value="[1,2,3,5,8]">
            </div>
            <div class="col-md-2 mb-2 d-flex align-items-end">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="tc_public" value="1" checked>
                <label class="form-check-label small">公开</label>
              </div>
            </div>
          </div>
        </div>
        <div class="testcase-group card mb-2 p-3 bg-light">
          <div class="row">
            <div class="col-md-5 mb-2">
              <input type="text" class="form-control" name="tc_input" value="[1]">
            </div>
            <div class="col-md-5 mb-2">
              <input type="text" class="form-control" name="tc_expected" value="[1]">
            </div>
            <div class="col-md-2 mb-2 d-flex align-items-end">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="tc_public" value="1" checked>
                <label class="form-check-label small">公开</label>
              </div>
            </div>
          </div>
        </div>
      </div>

      <button type="submit" class="btn btn-primary mt-3">✅ 创建题目</button>
    </form>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
function addTestCase() {
  const html = `
    <div class="testcase-group card mb-2 p-3 bg-light">
      <div class="row">
        <div class="col-md-5 mb-2">
          <label class="form-label small">输入 (JSON 数组)</label>
          <input type="text" class="form-control" name="tc_input" placeholder="[5,4,3,2,1]">
        </div>
        <div class="col-md-5 mb-2">
          <label class="form-label small">期望输出 (可选)</label>
          <input type="text" class="form-control" name="tc_expected" placeholder="[1,2,3,4,5]">
        </div>
        <div class="col-md-2 mb-2 d-flex align-items-end">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" name="tc_public" value="1" checked>
            <label class="form-check-label small">公开</label>
          </div>
        </div>
      </div>
    </div>`;
  document.getElementById('testcases-container').insertAdjacentHTML('beforeend', html);
}
</script>
{% endblock %}
